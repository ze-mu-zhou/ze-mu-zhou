<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="UNIT-07 technical archive header">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0d0d0d" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <pattern id="hazard" width="40" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="20" height="16" fill="#ff4d00"/>
      <rect x="20" width="20" height="16" fill="#0d0d0d"/>
    </pattern>
    <style>
      .paper{fill:#e8e6e1}.ink{fill:#0d0d0d}.steel{fill:#8a8a8a}.rail{stroke:#0d0d0d}.accent{fill:#ff4d00}
      .mono{font-family:"JetBrains Mono","SFMono-Regular",Consolas,monospace}
      .sans{font-family:"Space Grotesk","Arial Narrow",Arial,sans-serif}
      .tiny{font-size:14px;letter-spacing:2px}.small{font-size:18px;letter-spacing:3px}
      .big{font-size:112px;font-weight:600;letter-spacing:-6px}.outline{fill:none;stroke:#0d0d0d;stroke-width:2}
    </style>
  </defs>
  <rect class="paper" width="1200" height="360"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect width="1200" height="16" fill="url(#hazard)"/>
  <rect y="344" width="1200" height="16" fill="url(#hazard)"/>

  <line x1="0" y1="56" x2="1200" y2="56" class="rail" stroke-width="1"/>
  <line x1="0" y1="304" x2="1200" y2="304" class="rail" stroke-width="1"/>

  <circle cx="34" cy="36" r="6" class="accent"/>
  <text x="54" y="41" class="mono tiny ink">DOC · A-07 / REV.04</text>
  <text x="600" y="41" text-anchor="middle" class="mono tiny ink">TECHNICAL ARCHIVE — ZE-MU-ZHOU</text>
  <text x="1166" y="41" text-anchor="end" class="mono tiny steel">SYS: NOMINAL</text>

  <g class="rail" stroke-width="1">
    <line x1="28" y1="86" x2="28" y2="126"/><line x1="8" y1="106" x2="48" y2="106"/>
    <line x1="1172" y1="86" x2="1172" y2="126"/><line x1="1152" y1="106" x2="1192" y2="106"/>
    <line x1="28" y1="234" x2="28" y2="274"/><line x1="8" y1="254" x2="48" y2="254"/>
    <line x1="1172" y1="234" x2="1172" y2="274"/><line x1="1152" y1="254" x2="1192" y2="254"/>
  </g>

  <text x="72" y="104" class="mono tiny steel">PROJECT</text>
  <text x="72" y="128" class="mono tiny ink">REVERSE ENGINEERING UNIT</text>
  <line x1="72" y1="146" x2="164" y2="146" stroke="#ff4d00" stroke-width="3"/>

  <text x="230" y="166" class="sans big ink">ZE-MU<tspan fill="#ff4d00">/</tspan></text>
  <text x="230" y="266" class="sans big outline">ZHOU</text>
  <text x="235" y="294" class="mono small steel">AI-NATIVE BINARY ANALYSIS · PWN · CTF TOOLING</text>

  <g transform="translate(860 108)">
    <rect x="0" y="0" width="260" height="156" fill="none" stroke="#0d0d0d"/>
    <line x1="0" y1="34" x2="260" y2="34" stroke="#0d0d0d"/>
    <line x1="0" y1="64" x2="260" y2="64" stroke="#c9c6bf"/>
    <line x1="0" y1="94" x2="260" y2="94" stroke="#c9c6bf"/>
    <line x1="0" y1="124" x2="260" y2="124" stroke="#c9c6bf"/>
    <text x="16" y="23" class="mono tiny steel">FIELD</text>
    <text x="244" y="23" text-anchor="end" class="mono tiny ink">VALUE</text>
    <text x="16" y="54" class="mono tiny steel">TYPE</text>
    <text x="244" y="54" text-anchor="end" class="mono tiny ink">PROFILE README</text>
    <text x="16" y="84" class="mono tiny steel">FOCUS</text>
    <text x="244" y="84" text-anchor="end" class="mono tiny ink">RE / PWN / AI</text>
    <text x="16" y="114" class="mono tiny steel">TOOL</text>
    <text x="244" y="114" text-anchor="end" class="mono tiny ink">IDA-CLI</text>
    <text x="16" y="144" class="mono tiny steel">STATUS</text>
    <text x="244" y="144" text-anchor="end" class="mono tiny" fill="#ff4d00">● LIVE</text>
  </g>

  <g class="mono tiny steel">
    <text x="36" y="327">000</text><text x="156" y="327">100</text><text x="276" y="327">200</text>
    <text x="396" y="327">300</text><text x="516" y="327">400</text><text x="636" y="327">500</text>
    <text x="756" y="327">600</text><text x="876" y="327">700</text><text x="996" y="327">800</text><text x="1116" y="327">MM</text>
  </g>
  <g stroke="#0d0d0d">
    <line x1="0" y1="304" x2="0" y2="344"/><line x1="120" y1="304" x2="120" y2="344"/>
    <line x1="240" y1="304" x2="240" y2="344"/><line x1="360" y1="304" x2="360" y2="344"/>
    <line x1="480" y1="304" x2="480" y2="344"/><line x1="600" y1="304" x2="600" y2="344"/>
    <line x1="720" y1="304" x2="720" y2="344"/><line x1="840" y1="304" x2="840" y2="344"/>
    <line x1="960" y1="304" x2="960" y2="344"/><line x1="1080" y1="304" x2="1080" y2="344"/>
    <line x1="1200" y1="304" x2="1200" y2="344"/>
  </g>
</svg>
